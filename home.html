<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Girl</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="home.css">

</head>

<body>

<div class="background-blur"></div>

<div class="page">

    <div class="lock-card">

        <div class="top-circle"></div>

        <h1 class="title">

            بەخێربێیت قژلوکەکەم

        </h1>

        <p class="subtitle">

            کۆدەکە لێبدە جا برۆ 🎀

        </p>

        <div class="password-box">

            <input

                type="password"

                id="password"

                placeholder="••••••••"

                autocomplete="off">

        </div>

        <button

            id="unlockBtn">

            My Girl

        </button>

        <p

            id="message">

        </p>

    </div>

</div>

<div

id="quizPage"

class="hidden">

<div class="quiz-card">

<h2>

هێشتان ماوتە، دەچێیە کوێ؟؟

</h2>

<button

id="startQuiz">

Start

</button>

</div>

</div>

<script src="home.js"></script>

</body>

</html>
