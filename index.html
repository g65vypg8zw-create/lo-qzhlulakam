<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For You ❤️</title>

    <meta http-equiv="refresh" content="2; url=home.html">

    <style>

        *{

            margin:0;

            padding:0;

            box-sizing:border-box;

        }

        body{

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

            background:linear-gradient(
                180deg,
                #fffafc,
                #fff1f7
            );

            font-family:"Poppins",sans-serif;

            overflow:hidden;

        }

        .loader{

            text-align:center;

        }

        .heart{

            font-size:70px;

            animation:beat 1.2s infinite;

        }

        h1{

            margin-top:20px;

            color:#d96b9b;

            font-size:28px;

            font-weight:600;

        }

        p{

            margin-top:12px;

            color:#777;

            font-size:17px;

        }

        .dots{

            margin-top:18px;

            display:flex;

            justify-content:center;

            gap:10px;

        }

        .dots span{

            width:10px;

            height:10px;

            border-radius:50%;

            background:#ff9ec8;

            animation:bounce 1s infinite;

        }

        .dots span:nth-child(2){

            animation-delay:.2s;

        }

        .dots span:nth-child(3){

            animation-delay:.4s;

        }

        @keyframes beat{

            0%{

                transform:scale(1);

            }

            50%{

                transform:scale(1.2);

            }

            100%{

                transform:scale(1);

            }

        }

        @keyframes bounce{

            0%,100%{

                transform:translateY(0);

                opacity:.5;

            }

            50%{

                transform:translateY(-8px);

                opacity:1;

            }

        }

    </style>

</head>

<body>

    <div class="loader">

        <div class="heart">❤️</div>

        <h1>Welcome</h1>

        <p>Preparing something special...</p>

        <div class="dots">

            <span></span>

            <span></span>

            <span></span>

        </div>

    </div>

</body>

</html>
